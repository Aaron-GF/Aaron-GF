name: Update Codewars Stats

on:
  schedule:
    # Se ejecuta diariamente
    - cron: '0 0 * * *' 
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          # trae el historial para poder hacer amend
          fetch-depth: 0 

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 

      - name: Ejecutar script de actualización
        run: node update-codewars.js

      - name: Guardar cambios en el repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add README.md
          
          # Verifica si hay cambios antes de proceder
          if git diff --staged --quiet; then
            echo "No hay cambios en las estadísticas."
            exit 0
          fi

          # Sobrescribe el último commit si fue del bot, 
          # o crea uno nuevo si es necesario, pero siempre forzando un historial limpio.
          git commit --amend -m "chore: update codewars stats (automated)" || git commit -m "chore: update codewars stats (automated)"
          
          # Force push para que el historial no crezca
          git push origin main --force
